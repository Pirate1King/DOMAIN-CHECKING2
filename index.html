<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Domain Tracking Check</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap");
      :root {
        color-scheme: light;
        --bg: #060b09;
        --ink: #d6ffe9;
        --muted: #7fd4b2;
        --accent: #18ff86;
        --accent-2: #12c06b;
        --card: rgba(7, 16, 12, 0.92);
        --border: #143a28;
        --shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        --grid: rgba(24, 255, 134, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Share Tech Mono", "Consolas", monospace;
        background:
          linear-gradient(0deg, var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px),
          radial-gradient(circle at 15% 20%, rgba(24, 255, 134, 0.16), transparent 40%),
          radial-gradient(circle at 85% 0%, rgba(24, 255, 134, 0.12), transparent 35%),
          var(--bg);
        background-size: 28px 28px, 28px 28px, auto, auto, auto;
        color: var(--ink);
      }
      .wrap {
        max-width: 1100px;
        margin: 32px auto;
        padding: 0 20px 40px;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 16px;
        flex-wrap: wrap;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .subtitle {
        color: var(--muted);
      }
      .panel {
        margin-top: 20px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        box-shadow: var(--shadow);
      }
      textarea {
        width: 100%;
        min-height: 160px;
        padding: 12px;
        font-size: 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #04110a;
        color: var(--ink);
        resize: vertical;
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }
      .toggle input {
        accent-color: var(--accent);
      }
      button {
        background: var(--accent);
        color: #02160c;
        border: none;
        padding: 10px 18px;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 10px 22px rgba(24, 255, 134, 0.2);
        text-transform: uppercase;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .hint {
        color: var(--muted);
        font-size: 13px;
      }
      .table-wrap {
        margin-top: 16px;
        max-height: 420px;
        overflow: auto;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #040f0a;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        min-width: 920px;
      }
      th, td {
        border: 1px solid var(--border);
        padding: 8px 10px;
        vertical-align: top;
      }
      th {
        background: #062014;
        text-align: left;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      td {
        word-break: break-word;
        white-space: pre-wrap;
      }
      a.hacker-link,
      a.hacker-link:visited,
      a.hacker-link:hover,
      a.hacker-link:active {
        color: #5dffb0;
        text-decoration: underline;
        text-decoration-color: rgba(93, 255, 176, 0.45);
      }
      td[data-detail] {
        cursor: pointer;
        text-decoration: underline;
        text-decoration-color: rgba(24, 255, 134, 0.35);
      }
      .status {
        font-weight: 600;
      }
      .status.bad {
        color: #ff5f5f;
      }
      .status.ok {
        color: #34ff97;
      }
      .domain-cell {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        flex: 0 0 8px;
      }
      .status-dot.ok {
        background: #34ff97;
        box-shadow: 0 0 0 1px rgba(52, 255, 151, 0.35);
      }
      .status-dot.warn {
        background: #ffb454;
        box-shadow: 0 0 0 1px rgba(255, 180, 84, 0.35);
      }
      .status-dot.info {
        background: #ffd76a;
        box-shadow: 0 0 0 1px rgba(255, 215, 106, 0.35);
      }
      .status-dot.bad {
        background: #ff5f5f;
        box-shadow: 0 0 0 1px rgba(255, 95, 95, 0.35);
      }
      .footer-note {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }
      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .filter-dropdown {
        position: relative;
        min-width: 260px;
      }
      .filter-trigger {
        background: #07160f;
        color: var(--ink);
        border: 1px solid #1d6a49;
        border-radius: 8px;
        padding: 8px 10px;
        font-family: "Share Tech Mono", "Consolas", monospace;
        font-size: 12px;
        min-width: 260px;
        box-shadow: inset 0 0 0 1px rgba(24, 255, 134, 0.12);
        cursor: pointer;
        list-style: none;
        user-select: none;
      }
      .filter-trigger::-webkit-details-marker {
        display: none;
      }
      .filter-trigger::after {
        content: "▾";
        float: right;
        color: var(--muted);
      }
      .filter-dropdown[open] .filter-trigger::after {
        content: "▴";
      }
      .filter-trigger:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(24, 255, 134, 0.18);
      }
      .filter-menu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        z-index: 6;
        min-width: 280px;
        max-width: min(360px, 90vw);
        padding: 8px;
        border-radius: 10px;
        border: 1px solid #1d6a49;
        background: #07160f;
        box-shadow: 0 14px 32px rgba(0, 0, 0, 0.35);
      }
      .filter-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 6px;
        color: var(--ink);
        font-size: 12px;
      }
      .filter-item input {
        accent-color: var(--accent);
      }
      .filter-help {
        color: var(--muted);
        font-size: 11px;
        padding: 4px 6px 2px;
      }
      .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #07160f;
        color: var(--ink);
        cursor: pointer;
      }
      .webhook-input {
        min-width: 320px;
        max-width: 520px;
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #07160f;
        color: var(--ink);
        font-size: 12px;
      }
      .copy-btn svg {
        width: 16px;
        height: 16px;
        fill: var(--accent);
      }
      .scroll-hint {
        color: var(--muted);
        font-size: 12px;
      }
      .filter-help-inline {
        color: var(--muted);
        font-size: 11px;
      }
      .summary-box {
        margin-top: 10px;
        padding: 10px 12px;
        border: 1px dashed var(--border);
        border-radius: 10px;
        background: #04120c;
        color: var(--muted);
        font-size: 12px;
        white-space: pre-wrap;
      }
      .summary-error {
        color: #ff5f5f;
      }
      .progress {
        margin-top: 10px;
        background: #04110a;
        border: 1px solid var(--border);
        border-radius: 999px;
        height: 12px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #18ff86, #12c06b);
        transition: width 0.2s ease;
      }
      .progress-text {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }
      .tooltip {
        position: fixed;
        top: 90px;
        right: 20px;
        width: min(460px, calc(100vw - 32px));
        padding: 10px 12px;
        background: #02110a;
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
        color: var(--ink);
        font-size: 12px;
        z-index: 20;
        display: none;
      }
      .tooltip-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .tooltip-title {
        color: var(--accent);
        text-transform: uppercase;
      }
      .tooltip-subtitle {
        color: var(--muted);
        font-size: 11px;
      }
      .tooltip-close {
        border: 1px solid var(--border);
        background: #04150e;
        color: var(--ink);
        border-radius: 6px;
        font-size: 11px;
        padding: 4px 8px;
        cursor: pointer;
      }
      .active-detail-cell {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
      }
      .active-detail-row td {
        background: rgba(24, 255, 134, 0.06);
      }
      .tooltip-list {
        max-height: 240px;
        overflow: auto;
        padding-right: 6px;
      }
      .tooltip-item {
        border: 1px solid #0f2f20;
        border-radius: 8px;
        padding: 6px 8px;
        margin-bottom: 8px;
        background: #04150e;
        word-break: break-word;
      }
      .tooltip-item:last-child {
        margin-bottom: 0;
      }
      .tooltip-label {
        color: var(--muted);
        margin-bottom: 4px;
        font-size: 11px;
        text-transform: uppercase;
      }
      .tooltip-link {
        color: var(--ink);
      }
      .tooltip-meta {
        color: var(--accent);
        font-size: 12px;
        margin-top: 4px;
      }
      .tooltip-open-link {
        display: inline-block;
        margin-top: 6px;
        margin-bottom: 4px;
        color: #7fffd4;
        text-decoration: underline;
        text-decoration-color: #0dbd83;
        font-size: 12px;
      }
      .tooltip-open-link:hover {
        color: #baffea;
      }
      .tooltip-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 6px;
        margin-bottom: 2px;
      }
      .tooltip-pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        margin-top: 6px;
      }
      .tooltip-pill.wrapped {
        color: #ffd760;
        background: rgba(255, 215, 96, 0.12);
        border: 1px solid rgba(255, 215, 96, 0.35);
      }
      .tooltip-pill.subpage {
        color: #7fffd4;
        background: rgba(127, 255, 212, 0.12);
        border: 1px solid rgba(127, 255, 212, 0.35);
      }
      .tooltip-pill.direct {
        color: #9ee0b5;
        background: rgba(158, 224, 181, 0.12);
        border: 1px solid rgba(158, 224, 181, 0.35);
      }
      .tooltip-path {
        color: var(--ink);
        font-size: 11px;
        margin-top: 4px;
      }
      .path-grid {
        margin-top: 6px;
        border: 1px solid #0f2f20;
        border-radius: 8px;
        background: #03110b;
        overflow: hidden;
      }
      .path-row {
        display: grid;
        grid-template-columns: 84px 1fr;
        gap: 8px;
        padding: 6px 8px;
        border-bottom: 1px solid #0c251a;
      }
      .path-row:last-child {
        border-bottom: none;
      }
      .path-label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }
      .path-value {
        color: var(--ink);
        font-size: 11px;
        word-break: break-all;
      }
      .diff-highlight {
        background: #ffe45c;
        color: #1a1a1a;
        padding: 0 2px;
        border-radius: 2px;
      }
      .tooltip-context {
        color: var(--muted);
        font-size: 11px;
        margin-top: 4px;
      }
      @media (max-width: 720px) {
        h1 { font-size: 22px; }
        table { font-size: 12px; }
        .table-wrap { max-height: 320px; }
        .wrap {
          padding: 0 12px 28px;
        }
        .panel {
          padding: 12px;
        }
        .row {
          align-items: stretch;
        }
        .row > button,
        .row > .toggle,
        .row > .hint {
          flex: 1 1 100%;
        }
        .actions {
          gap: 8px;
          align-items: stretch;
        }
        .actions .copy-btn,
        .actions .filter-dropdown {
          flex: 1 1 calc(50% - 8px);
          min-width: 0;
        }
        .actions .copy-btn {
          justify-content: center;
        }
        .filter-trigger {
          min-width: 0;
          width: 100%;
        }
        .filter-menu {
          min-width: 0;
          width: 100%;
          max-width: 100%;
        }
        .actions .webhook-input {
          flex: 1 1 100%;
          min-width: 0;
        }
        .webhook-input {
          min-width: 0;
        }
        .tooltip {
          top: 72px;
          right: 8px;
          width: calc(100vw - 16px);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Tracking Domain Checker</h1>
        <div class="subtitle">Scan links containing a=mswl and flag 301/302/307/308</div>
      </header>
      <div class="panel">
        <div class="hint">Paste one domain per line</div>
        <textarea id="domains"></textarea>
        <div class="row">
          <button id="runBtn">Run Check</button>
          <div id="status" class="hint"></div>
        </div>
      </div>
      <div class="panel">
        <div class="hint">Results</div>
        <div class="actions">
          <button id="copyBtn" class="copy-btn" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16 1H6a2 2 0 0 0-2 2v10h2V3h10V1zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H10V7h9v14z"/>
            </svg>
            Copy Error Summary
          </button>
          <button id="copyTableBtn" class="copy-btn" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 3h16a1 1 0 0 1 1 1v4h-2V5H5v14h4v2H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm6 6h10a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H10a1 1 0 0 1-1-1V10a1 1 0 0 1 1-1zm1 3v2h8v-2h-8zm0 4v2h8v-2h-8z"/>
            </svg>
            Copy Table (Sheets)
          </button>
          <button id="sendChatBtn" class="copy-btn" type="button">
            Send To Google Chat
          </button>
          <details id="filterDropdown" class="filter-dropdown">
            <summary id="filterSummary" class="filter-trigger">Filter: Tất cả</summary>
            <div class="filter-menu">
              <label class="filter-item"><input type="checkbox" class="error-filter-checkbox" value="tracking_error">Lỗi tracking (tất cả)</label>
              <label class="filter-item"><input type="checkbox" class="error-filter-checkbox" value="wrapped">Link bọc chưa đổi domain mới</label>
              <label class="filter-item"><input type="checkbox" class="error-filter-checkbox" value="subpage">Link nằm ở trang con</label>
              <label class="filter-item"><input type="checkbox" class="error-filter-checkbox" value="access_error">Domain không truy cập được</label>
              <label class="filter-item"><input type="checkbox" class="error-filter-checkbox" value="missing_https">Thiếu https (http bị redirect)</label>
              <div class="filter-help">Tick nhiều mục để lọc nhiều điều kiện.</div>
            </div>
          </details>
          <span class="filter-help-inline">Bỏ tick hết = hiện tất cả</span>
          <div class="scroll-hint"></div>
        </div>
        <div class="actions">
          <input id="webhookUrl" class="webhook-input" type="password" placeholder="Google Chat webhook URL">
        </div>
        <div class="progress" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="progressText" class="progress-text">Processed 0/0</div>
        <div id="summaryBox" class="summary-box">No errors yet.</div>
        <div id="results"></div>
        <div class="footer-note">Tracking_error = redirect 301/302/307/308 sang domain khac</div>
      </div>
    </div>
    <div id="tooltip" class="tooltip" role="dialog" aria-hidden="true">
      <div class="tooltip-head">
        <div>
          <div id="tooltipTitle" class="tooltip-title"></div>
          <div id="tooltipSubtitle" class="tooltip-subtitle"></div>
        </div>
        <button id="tooltipClose" class="tooltip-close" type="button">Close</button>
      </div>
      <div id="tooltipBody" class="tooltip-list"></div>
    </div>
    <script>
      const API_BASE = "";
      const runBtn = document.getElementById("runBtn");
      const statusEl = document.getElementById("status");
      const resultsEl = document.getElementById("results");
      const textarea = document.getElementById("domains");
      const copyBtn = document.getElementById("copyBtn");
      const copyTableBtn = document.getElementById("copyTableBtn");
      const sendChatBtn = document.getElementById("sendChatBtn");
      const webhookUrl = document.getElementById("webhookUrl");
      const tooltip = document.getElementById("tooltip");
      const tooltipTitle = document.getElementById("tooltipTitle");
      const tooltipSubtitle = document.getElementById("tooltipSubtitle");
      const tooltipBody = document.getElementById("tooltipBody");
      const tooltipClose = document.getElementById("tooltipClose");
      const progressBar = document.getElementById("progressBar");
      const progressText = document.getElementById("progressText");
      const summaryBox = document.getElementById("summaryBox");
      const filterSummary = document.getElementById("filterSummary");
      const errorFilterCheckboxes = Array.from(document.querySelectorAll(".error-filter-checkbox"));
      let lastData = null;
      let pollTimer = null;
      let activeDetailCell = null;
      let activeDetailRow = null;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function updateFilterSummaryText() {
        if (!filterSummary) return;
        const selectedLabels = errorFilterCheckboxes
          .filter((cb) => cb.checked)
          .map((cb) => {
            const label = cb.parentElement;
            if (!label) return cb.value;
            return (label.textContent || "").trim();
          });
        filterSummary.textContent = selectedLabels.length
          ? `Filter: ${selectedLabels.length} mục`
          : "Filter: Tất cả";
      }

      function getSelectedFilters() {
        return errorFilterCheckboxes.filter((cb) => cb.checked).map((cb) => cb.value);
      }

      function getFilteredRowsAndIndexes(header, rows, details) {
        const selected = getSelectedFilters();
        const sourceRows = rows || [];
        if (!sourceRows.length || !selected.length) {
          return { rows: sourceRows, indexes: sourceRows.map((_, idx) => idx) };
        }
        const idxPageStatus = header.indexOf("page_status");
        const idxTrackingError = header.indexOf("tracking_error");
        const viewRows = [];
        const indexes = [];
        sourceRows.forEach((row, idx) => {
          const pageStatus = Number(row[idxPageStatus] || 0);
          const trackingError = Number(row[idxTrackingError] || 0);
          const badLinks = ((details || [])[idx] || {}).tracking_error || [];
          const hasWrapped = badLinks.some((item) => String(item.wrapped_from || "").trim());
          const hasSubpage = badLinks.some((item) => String(item.subpage_from || "").trim() && !String(item.wrapped_from || "").trim());
          const hasMissingHttps = badLinks.some((item) => String(item.error_type || "").toLowerCase() === "missing_https");
          const keep = selected.some((filter) => {
            if (filter === "tracking_error") return trackingError > 0;
            if (filter === "wrapped") return hasWrapped;
            if (filter === "subpage") return hasSubpage;
            if (filter === "access_error") return pageStatus !== 200;
            if (filter === "missing_https") return hasMissingHttps;
            return false;
          });
          if (keep) {
            viewRows.push(row);
            indexes.push(idx);
          }
        });
        return { rows: viewRows, indexes };
      }

      function renderTable(header, rows, sourceIndexes) {
        const prevWrap = resultsEl.querySelector(".table-wrap");
        const prevScrollTop = prevWrap ? prevWrap.scrollTop : 0;
        const prevScrollLeft = prevWrap ? prevWrap.scrollLeft : 0;

        if (!rows.length) {
          resultsEl.innerHTML = "<div class='hint'>No results.</div>";
          return;
        }
        let html = "<div class='table-wrap'><table><thead><tr>";
        for (const col of header) {
          html += `<th>${col}</th>`;
        }
        html += "</tr></thead><tbody>";
        const idxPageStatus = header.indexOf("page_status");
        const idxTrackingError = header.indexOf("tracking_error");
        const idxNotes = header.indexOf("notes");
        rows.forEach((row, rowIdx) => {
          const sourceRowIdx = Array.isArray(sourceIndexes) ? sourceIndexes[rowIdx] : rowIdx;
          const pageStatusVal = idxPageStatus >= 0 ? Number(row[idxPageStatus] || 0) : 0;
          const trackingErrorVal = idxTrackingError >= 0 ? Number(row[idxTrackingError] || 0) : 0;
          const notesVal = idxNotes >= 0 ? String(row[idxNotes] || "").toLowerCase() : "";
          const hasNoTracking = notesVal.includes("no_tracking_links");
          let dotClass = "ok";
          let dotTitle = "OK";
          if (trackingErrorVal > 0) {
            dotClass = "bad";
            dotTitle = "Tracking error";
          } else if (pageStatusVal === 0 || pageStatusVal >= 400) {
            dotClass = "warn";
            dotTitle = "Page status error";
          } else if (hasNoTracking) {
            dotClass = "info";
            dotTitle = "No tracking link";
          }
          html += "<tr>";
          row.forEach((cell, idx) => {
            let value = cell === null || cell === undefined ? "" : String(cell);
            if (header[idx] === "tracking_ok") {
              const num = Number(value);
              const klass = num === 0 ? "status bad" : "status ok";
              html += `<td class="${klass}" data-detail="tracking_ok" data-row="${sourceRowIdx}">${value}</td>`;
            } else if (header[idx] === "tracking_error") {
              const num = Number(value);
              const klass = num === 0 ? "status ok" : "status bad";
              html += `<td class="${klass}" data-detail="tracking_error" data-row="${sourceRowIdx}">${value}</td>`;
            } else if (header[idx] === "page_status") {
              const num = Number(value);
              const klass = num >= 200 && num < 400 ? "status ok" : "status bad";
              html += `<td class="${klass}">${value}</td>`;
            } else if (header[idx] === "page_url") {
              const safeUrl = escapeHtml(value);
              if (value) {
                html += `<td><a class="hacker-link" href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeUrl}</a></td>`;
              } else {
                html += "<td></td>";
              }
            } else if (header[idx] === "domain") {
              const safeDomain = escapeHtml(value);
              html += `<td><span class="domain-cell"><span class="status-dot ${dotClass}" title="${dotTitle}" aria-label="${dotTitle}"></span><span>${safeDomain}</span></span></td>`;
            } else {
              html += `<td>${value}</td>`;
            }
          });
          html += "</tr>";
        });
        html += "</tbody></table></div>";
        resultsEl.innerHTML = html;
        const nextWrap = resultsEl.querySelector(".table-wrap");
        if (nextWrap) {
          nextWrap.scrollTop = prevScrollTop;
          nextWrap.scrollLeft = prevScrollLeft;
        }
      }

      function formatToday() {
        const d = new Date();
        const dd = String(d.getDate()).padStart(2, "0");
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const yyyy = d.getFullYear();
        return `${dd}/${mm}/${yyyy}`;
      }

      function hostFromUrl(rawUrl) {
        try {
          const u = new URL(String(rawUrl || ""));
          return (u.hostname || "").replace(/^www\./i, "").toLowerCase();
        } catch {
          return "";
        }
      }

      function collectRedirectPairs(badLinks) {
        const pairs = [];
        const seen = new Set();
        (badLinks || []).forEach((item) => {
          const fromHost = hostFromUrl(item.link);
          const toHost = hostFromUrl(item.final_url);
          if (!fromHost || !toHost) return;
          const key = `${fromHost}->${toHost}`;
          if (seen.has(key)) return;
          seen.add(key);
          pairs.push(`${fromHost} -> ${toHost}`);
        });
        return pairs;
      }

      function buildQcLines(header, rows, details) {
        if (!rows.length) return [];
        const idxDomain = header.indexOf("domain");
        const idxPageStatus = header.indexOf("page_status");
        const idxTrackingError = header.indexOf("tracking_error");
        const idxNotes = header.indexOf("notes");
        const lines = [];

        rows.forEach((row, rowIdx) => {
          const domain = row[idxDomain];
          const pageStatus = Number(row[idxPageStatus] || 0);
          const trackingError = Number(row[idxTrackingError] || 0);
          const notes = String(row[idxNotes] || "");
          const detail = details[rowIdx] || {};
          const badLinks = detail.tracking_error || [];

          if (pageStatus !== 200) {
            if (pageStatus === 0) {
              lines.push(`${domain}: không truy cập được (${notes || "dns/network"})`);
            } else {
              lines.push(`${domain}: page status ${pageStatus}`);
            }
          }

          if (trackingError > 0) {
            const pairs = collectRedirectPairs(badLinks);
            const pairText = pairs.length ? ` (${pairs.join(", ")})` : "";
            const hasWrapped = badLinks.some((item) => String(item.wrapped_from || "").trim());
            if (hasWrapped) {
              lines.push(`${domain}: Link lastest (bọc link)${pairText}`);
            } else {
              lines.push(`${domain}: Link lastest${pairText}`);
            }
          }
        });
        return lines;
      }

      function buildGroupedIssues(header, rows, details) {
        const idxDomain = header.indexOf("domain");
        const idxPageStatus = header.indexOf("page_status");
        const idxTrackingError = header.indexOf("tracking_error");
        const idxNotes = header.indexOf("notes");
        const groups = {
          access: [],
          missingHttps: [],
          latest: [],
          wrapped: [],
        };

        rows.forEach((row, rowIdx) => {
          const domain = row[idxDomain];
          const pageStatus = Number(row[idxPageStatus] || 0);
          const trackingError = Number(row[idxTrackingError] || 0);
          const notes = String(row[idxNotes] || "");
          const detail = details[rowIdx] || {};
          const badLinks = detail.tracking_error || [];

          if (pageStatus !== 200) {
            if (pageStatus === 0) {
              groups.access.push(`${domain}: không truy cập được (${notes || "dns/network"})`);
            } else {
              groups.access.push(`${domain}: page status ${pageStatus}`);
            }
          }

          if (trackingError > 0) {
            const missingHttpsLinks = badLinks.filter((item) => String(item.error_type || "").toLowerCase() === "missing_https" || String(item.reason || "").toLowerCase().includes("thieu-https"));
            if (missingHttpsLinks.length) {
              groups.missingHttps.push(`${domain}`);
            }

            const nonHttpsBadLinks = badLinks.filter((item) => !(String(item.error_type || "").toLowerCase() === "missing_https" || String(item.reason || "").toLowerCase().includes("thieu-https")));
            if (!nonHttpsBadLinks.length) {
              return;
            }
            const pairs = collectRedirectPairs(nonHttpsBadLinks);
            const pairText = pairs.length ? ` (${pairs.join(", ")})` : "";
            const hasWrapped = nonHttpsBadLinks.some((item) => String(item.wrapped_from || "").trim());
            if (hasWrapped) {
              groups.wrapped.push(`${domain}${pairText}`);
            } else {
              groups.latest.push(`${domain}${pairText}`);
            }
          }
        });

        return groups;
      }

      function groupedIssuesToLines(groups) {
        const lines = [];
        if (groups.access.length) {
          lines.push("[Lỗi truy cập domain]");
          groups.access.forEach((item) => lines.push(`- ${item}`));
        }
        if (groups.latest.length) {
          lines.push("[Chưa đổi domain link]");
          groups.latest.forEach((item) => lines.push(`- ${item}`));
        }
        if (groups.missingHttps.length) {
          lines.push("[Thiếu https]");
          groups.missingHttps.forEach((item) => lines.push(`- ${item}`));
        }
        if (groups.wrapped.length) {
          lines.push("[Chưa đổi domain link (bọc link)]");
          groups.wrapped.forEach((item) => lines.push(`- ${item}`));
        }
        return lines;
      }

      function computeReportStats(header, rows) {
        const idxPageStatus = header.indexOf("page_status");
        const idxTrackingError = header.indexOf("tracking_error");
        const total = rows.length;
        let fail = 0;
        rows.forEach((row) => {
          const pageStatus = Number(row[idxPageStatus] || 0);
          const trackingError = Number(row[idxTrackingError] || 0);
          if (pageStatus !== 200 || trackingError > 0) {
            fail += 1;
          }
        });
        return { total, fail, pass: Math.max(0, total - fail) };
      }

      function buildErrorSummary(header, rows, details) {
        const groups = buildGroupedIssues(header, rows, details || []);
        const lines = groupedIssuesToLines(groups);
        return lines.length ? lines.join("\n") : "No errors found.";
      }
      function buildQcChatReport(header, rows, details) {
        const lines = [`QC Report (${formatToday()})`];
        const groups = buildGroupedIssues(header, rows, details || []);
        const issueLines = groupedIssuesToLines(groups);
        if (!issueLines.length) {
          lines.push("không có lỗi.");
          return lines.join("\n");
        }
        lines.push(...issueLines);
        return lines.join("\n");
      }
      function escapeForChatHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }
      function buildQcCardPayload(header, rows, details) {
        const stats = computeReportStats(header, rows);
        const groups = buildGroupedIssues(header, rows, details || []);
        const groupSections = [];
        if (groups.access.length) {
          groupSections.push({
            header: "Lỗi truy cập domain",
            widgets: [{ textParagraph: { text: groups.access.map((line) => `- ${escapeForChatHtml(line)}`).join("<br>") } }],
          });
        }
        if (groups.latest.length) {
          groupSections.push({
            header: "Chưa đổi domain link",
            widgets: [{ textParagraph: { text: groups.latest.map((line) => `- ${escapeForChatHtml(line)}`).join("<br>") } }],
          });
        }
        if (groups.missingHttps.length) {
          groupSections.push({
            header: "Thiếu https",
            widgets: [{ textParagraph: { text: groups.missingHttps.map((line) => `- ${escapeForChatHtml(line)}`).join("<br>") } }],
          });
        }
        if (groups.wrapped.length) {
          groupSections.push({
            header: "Chưa đổi domain link (bọc link)",
            widgets: [{ textParagraph: { text: groups.wrapped.map((line) => `- ${escapeForChatHtml(line)}`).join("<br>") } }],
          });
        }
        if (!groupSections.length) {
          groupSections.push({
            header: "Issues",
            widgets: [{ textParagraph: { text: "không có lỗi." } }],
          });
        }

        return {
          cardsV2: [
            {
              cardId: "qc-report",
              card: {
                header: {
                  title: `QC Report (${formatToday()})`,
                },
                sections: [
                  {
                    header: "Summary",
                    widgets: [
                      {
                        textParagraph: {
                          text: `&#x1F9EA; Total case: <b>${stats.total}</b><br>&#x2705; Pass: <b>${stats.pass}</b><br>&#x274C; Fail: <b>${stats.fail}</b>`,
                        },
                      },
                    ],
                  },
                  ...groupSections,
                ],
              },
            },
          ],
        };
      }
      runBtn.addEventListener("click", async () => {
        const domains = parseDomains(textarea.value);
        if (!domains.length) {
          setStatus("Please enter at least one domain.");
          return;
        }
        runBtn.disabled = true;
        setStatus("Starting...");
        progressBar.style.width = "0%";
        progressText.textContent = `Processed 0/${domains.length}`;
        resultsEl.innerHTML = "";
        try {
          const resp = await fetch(`${API_BASE}/run`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              domains,
            }),
          });
          if (!resp.ok) {
            throw new Error(`Server error ${resp.status}`);
          }
          const data = await resp.json();
          startPolling(data.job_id);
        } catch (err) {
          setStatus(String(err));
          runBtn.disabled = false;
        } finally {
          if (!pollTimer) {
            runBtn.disabled = false;
          }
        }
      });

      copyBtn.addEventListener("click", async () => {
        if (!lastData) {
          setStatus("No results to copy.");
          return;
        }
        const text = buildErrorSummary(lastData.header, lastData.rows, lastData.details || []);
        try {
          await navigator.clipboard.writeText(text);
          setStatus("Copied error summary.");
        } catch (err) {
          setStatus("Copy failed: " + err);
        }
      });

      copyTableBtn.addEventListener("click", async () => {
        if (!lastData) {
          setStatus("No results to copy.");
          return;
        }
        const header = lastData.header || [];
        const rows = lastData.rows || [];
        const lines = [];
        lines.push(header.join("\t"));
        rows.forEach((row) => {
          const safeRow = row.map((cell) => {
            const value = cell === null || cell === undefined ? "" : String(cell);
            return value.replace(/\t/g, " ").replace(/\r?\n/g, " ");
          });
          lines.push(safeRow.join("\t"));
        });
        try {
          await navigator.clipboard.writeText(lines.join("\n"));
          setStatus("Copied table for Sheets.");
        } catch (err) {
          setStatus("Copy failed: " + err);
        }
      });

      sendChatBtn.addEventListener("click", async () => {
        if (!lastData) {
          setStatus("No results to send.");
          return;
        }
        const webhook = (webhookUrl.value || "").trim();
        if (!webhook) {
          setStatus("Enter Google Chat webhook URL.");
          return;
        }
        const message = buildQcChatReport(lastData.header, lastData.rows, lastData.details || []);
        const chatPayload = buildQcCardPayload(lastData.header, lastData.rows, lastData.details || []);
        try {
          const resp = await fetch(`${API_BASE}/notify`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              webhook_url: webhook,
              message,
              chat_payload: chatPayload,
            }),
          });
          if (!resp.ok) {
            const errText = await resp.text();
            throw new Error(errText || `Notify error ${resp.status}`);
          }
          setStatus("Sent to Google Chat.");
        } catch (err) {
          setStatus("Send failed: " + err);
        }
      });

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function highlightDiff(original, updated) {
        if (!original || !updated) {
          return escapeHtml(updated || "");
        }
        const o = original;
        const u = updated;
        let start = 0;
        while (start < o.length && start < u.length && o[start] === u[start]) {
          start += 1;
        }
        let end = 0;
        while (
          end < o.length - start &&
          end < u.length - start &&
          o[o.length - 1 - end] === u[u.length - 1 - end]
        ) {
          end += 1;
        }
        const prefix = escapeHtml(u.slice(0, start));
        const mid = escapeHtml(u.slice(start, u.length - end));
        const suffix = escapeHtml(u.slice(u.length - end));
        if (!mid) {
          return escapeHtml(updated);
        }
        return `${prefix}<span class="diff-highlight">${mid}</span>${suffix}`;
      }

      function extractContextValue(context, key) {
        const text = String(context || "");
        const m = text.match(new RegExp(`${key}=([^;]+)`));
        return m ? m[1].trim() : "";
      }

      function buildLocateUrl(pageUrl, context) {
        const base = String(pageUrl || "").split("#")[0].trim();
        if (!base) return "";
        const textValue = extractContextValue(context, "text");
        if (!textValue) return base;
        const compact = textValue.replace(/\s+/g, " ").trim();
        if (!compact) return base;
        const snippet = compact.slice(0, 80);
        return `${base}#:~:text=${encodeURIComponent(snippet)}`;
      }

      function showTooltip(target, title, subtitle, list, pageUrlForLocate) {
        if (activeDetailCell) {
          activeDetailCell.classList.remove("active-detail-cell");
        }
        if (activeDetailRow) {
          activeDetailRow.classList.remove("active-detail-row");
        }
        activeDetailCell = target;
        activeDetailCell.classList.add("active-detail-cell");
        activeDetailRow = target.closest("tr");
        if (activeDetailRow) {
          activeDetailRow.classList.add("active-detail-row");
        }
        tooltipTitle.textContent = title;
        tooltipSubtitle.textContent = subtitle || "";
        if (!list.length) {
          tooltipBody.textContent = "No link details returned. Restart the UI server and run again.";
        } else {
          tooltipBody.innerHTML = list.map((item, idx) => {
            const link = escapeHtml(String(item.link || ""));
            const reason = escapeHtml(String(item.reason || ""));
            const rawFinal = String(item.final_url || "");
            const finalUrl = highlightDiff(String(item.link || ""), rawFinal);
            const context = escapeHtml(String(item.context || "no_text"));
            const sourceUrl = escapeHtml(String(item.source_url || item.link || ""));
            const wrappedFrom = escapeHtml(String(item.wrapped_from || ""));
            const subpageFromRaw = String(item.subpage_from || "");
            const subpageFrom = escapeHtml(subpageFromRaw);
            const wrappedRaw = String(item.wrapped_from || "").trim();
            const locateBaseUrl = subpageFromRaw || pageUrlForLocate;
            const locateUrl = buildLocateUrl(locateBaseUrl, String(item.context || ""));
            const locateButton = locateUrl
              ? `<a class="tooltip-open-link" href="${escapeHtml(locateUrl)}" target="_blank" rel="noopener noreferrer">Locate on page</a>`
              : "";
            const trackingOpenButton = link
              ? `<a class="tooltip-open-link" href="${link}" target="_blank" rel="noopener noreferrer">Open tracking</a>`
              : "";
            const subpageOpenButton = subpageFrom
              ? `<a class="tooltip-open-link" href="${subpageFrom}" target="_blank" rel="noopener noreferrer">Open subpage</a>`
              : "";
            const sourcePill = wrappedRaw
              ? `<div class="tooltip-pill wrapped">Nguon: boc redirect</div>`
              : (subpageFromRaw
                ? `<div class="tooltip-pill subpage">Nguon: trang con</div>`
                : `<div class="tooltip-pill direct">Nguon: direct</div>`);
            const pathLine = wrappedFrom
              ? `<div class="path-grid">
                  <div class="path-row"><div class="path-label">1. Link tracking</div><div class="path-value">${link}</div></div>
                  <div class="path-row"><div class="path-label">2. Link cuoi</div><div class="path-value">${finalUrl}</div></div>
                  <div class="path-row"><div class="path-label">Link tren UI</div><div class="path-value">${sourceUrl}</div></div>
                  <div class="path-row"><div class="path-label">Link trung gian</div><div class="path-value">${wrappedFrom}</div></div>
                </div>`
              : `<div class="path-grid">
                  <div class="path-row"><div class="path-label">1. Link tracking</div><div class="path-value">${link}</div></div>
                  <div class="path-row"><div class="path-label">2. Link cuoi</div><div class="path-value">${finalUrl}</div></div>
                  ${subpageFrom ? `<div class="path-row"><div class="path-label">Trang con</div><div class="path-value">${subpageFrom}</div></div>` : ""}
                </div>`;
            return `
              <div class="tooltip-item">
                <div class="tooltip-label">#${idx + 1}</div>
                <div class="tooltip-meta">Status: ${reason}</div>
                ${sourcePill}
                <div class="tooltip-actions">${trackingOpenButton}${subpageOpenButton}${locateButton}</div>
                ${pathLine}
                <div class="tooltip-context">context: ${context}</div>
              </div>
            `;
          }).join("");
        }
        tooltip.style.display = "block";
        tooltip.setAttribute("aria-hidden", "false");
      }

      function hideTooltip() {
        tooltip.style.display = "none";
        tooltip.setAttribute("aria-hidden", "true");
        if (activeDetailCell) {
          activeDetailCell.classList.remove("active-detail-cell");
          activeDetailCell = null;
        }
        if (activeDetailRow) {
          activeDetailRow.classList.remove("active-detail-row");
          activeDetailRow = null;
        }
      }

      resultsEl.addEventListener("click", (event) => {
        const cell = event.target.closest("td[data-detail]");
        if (!cell || !lastData) {
          if (!tooltip.contains(event.target)) {
            hideTooltip();
          }
          return;
        }
        if (activeDetailCell === cell) {
          hideTooltip();
          return;
        }
        const rowIdx = Number(cell.dataset.row || 0);
        const detailType = cell.dataset.detail;
        const detail = (lastData.details || [])[rowIdx] || {};
        const list = detail[detailType] || [];
        const title = detailType === "tracking_ok" ? "OK Tracking Links" : "Error Tracking Links";
        const header = lastData.header || [];
        const rows = lastData.rows || [];
        const domainIdx = header.indexOf("domain");
        const domain = domainIdx >= 0 && rows[rowIdx] ? rows[rowIdx][domainIdx] : "";
        const pageFinalIdx = header.indexOf("page_final_url");
        const pageUrlIdx = header.indexOf("page_url");
        const pageUrlForLocate =
          (pageFinalIdx >= 0 && rows[rowIdx] ? rows[rowIdx][pageFinalIdx] : "") ||
          (pageUrlIdx >= 0 && rows[rowIdx] ? rows[rowIdx][pageUrlIdx] : "");
        const subtitle = `Row ${rowIdx + 1}${domain ? ` • ${domain}` : ""}`;
        showTooltip(cell, title, subtitle, list, pageUrlForLocate);
      });
      tooltipClose.addEventListener("click", hideTooltip);

      document.addEventListener("click", (event) => {
        if (tooltip.style.display !== "block") return;
        const clickInsideTooltip = tooltip.contains(event.target);
        const clickDetailCell = event.target.closest("td[data-detail]");
        if (!clickInsideTooltip && !clickDetailCell) {
          hideTooltip();
        }
      });

      function startPolling(jobId) {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
        pollTimer = setInterval(async () => {
          try {
            const resp = await fetch(`${API_BASE}/status?job=${jobId}`);
            if (!resp.ok) {
              throw new Error(`Status error ${resp.status}`);
            }
            const data = await resp.json();
            lastData = data;
            const view = getFilteredRowsAndIndexes(data.header, data.rows, data.details || []);
            renderTable(data.header, view.rows, view.indexes);
            summaryBox.innerHTML = renderSummaryBox(data.header, data.rows, data.details || []);
            if (data.error) {
              setStatus(`Error: ${data.error}`);
              clearInterval(pollTimer);
              pollTimer = null;
              runBtn.disabled = false;
              return;
            }
            const total = data.total || 0;
            const done = data.rows.length || 0;
            const started = Number(data.started || 0);
            const pct = total ? Math.round((done / total) * 100) : 0;
            progressBar.style.width = `${pct}%`;
            const runningText = started > done ? ` | Running ${started}/${total}` : "";
            const currentDomainText = data.current_domain ? ` | ${data.current_domain}` : "";
            progressText.textContent = `Processed ${done}/${total}${runningText}`;
            setStatus(`Processed ${done}/${total}${runningText}${currentDomainText}`);
            if (data.done) {
              clearInterval(pollTimer);
              pollTimer = null;
              setStatus(`Done. ${data.rows.length} domains.`);
              runBtn.disabled = false;
            }
          } catch (err) {
            setStatus(String(err));
            clearInterval(pollTimer);
            pollTimer = null;
            runBtn.disabled = false;
          }
        }, 1000);
      }

      function parseDomains(text) {
        const lines = text.split(/\r?\n/);
        const found = [];
        const seen = new Set();
        const domainRegex = /(?:^|[^A-Za-z0-9.-])([A-Za-z0-9-]+(?:\.[A-Za-z0-9-]+)+)(?:[^A-Za-z0-9.-]|$)/g;
        for (const line of lines) {
          let match = null;
          while ((match = domainRegex.exec(line)) !== null) {
            const domain = match[1];
            if (!seen.has(domain)) {
              seen.add(domain);
              found.push(domain);
            }
          }
        }
        return found;
      }

      function renderSummaryBox(header, rows, details) {
        const summary = buildErrorSummary(header, rows, details || []);
        const stats = computeReportStats(header, rows);
        const statLine = `<div>Total case: ${stats.total} | Pass: ${stats.pass} | Fail: ${stats.fail}</div>`;
        if (summary === "No errors found." || summary === "No results.") {
          return `${statLine}<div>No errors yet.</div>`;
        }
        const issues = summary.split("\n").map((line) => {
          return `<div class="summary-error">${line}</div>`;
        }).join("");
        return `${statLine}${issues}`;
      }

      errorFilterCheckboxes.forEach((cb) => {
        cb.addEventListener("change", () => {
          updateFilterSummaryText();
          if (!lastData) return;
          hideTooltip();
          const view = getFilteredRowsAndIndexes(lastData.header, lastData.rows, lastData.details || []);
          renderTable(lastData.header, view.rows, view.indexes);
        });
      });
      updateFilterSummaryText();
    </script>
  </body>
</html>
